
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prediction Result</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-gauge"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Segoe UI;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #000000);
        background-size: 400% 400%;
        animation: bgMove 12s ease infinite;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
      }

      @keyframes bgMove {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .result-container {
        width: 90%;
        max-width: 800px;

        background: rgba(255, 255, 255, 0.07);
        padding: 30px;
        border-radius: 20px;
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
        text-align: center;
      }

      h1 {
        color: #00f7ff;
        text-shadow: 0 0 10px #00f7ff;
        margin-bottom: 10px;
      }

      h2 {
        margin-top: 10px;
        color: #ff00c8;
      }

      h3 {
        margin-bottom: 20px;
        color: #00ffff;
      }

      canvas {
        max-width: 300px;
        margin: 25px auto;
        background: white;
        border-radius: 10px;
      }

      button {
        margin-top: 20px;
        padding: 12px 30px;
        border: none;
        border-radius: 25px;
        background: linear-gradient(45deg, #00f7ff, #ff00c8);
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.4s;
      }

      button:hover {
        transform: scale(1.05);
        box-shadow: 0 0 15px #00f7ff;
      }

      
    </style>
  </head>

  <body>
    <div class="result-container">
      <h1>Employee Performance Result</h1>

      <h2>Employee: {{ name }}</h2>
      <h3>Gender: {{ gender }}</h3>
      <h3 id="predictionText">Performance Level: {{ prediction }}</h3>
      <h3>Rating: {{ score // 20 }} / 5 ⭐</h3>
      <h3>Performance Score: {{ score }}%</h3>

      <canvas id="performanceChart"></canvas>
      <!-- <canvas id="confusionChart"></canvas>
      <canvas id="importanceChart"></canvas> -->

      <button onclick="goHome()">Back to Home</button>
    </div>

    <script>

      // jinja --> from Flask --> {{ score | default(0) | tojson }};
      let score = {{ score | default(0) | tojson }};

      let color = "#ff6b6b";

      if (score > 70) color = "#00ff88";
      else if (score > 40) color = "#ffd369";

      new Chart(document.getElementById("performanceChart"), {
      type: "doughnut",

      data: {
        labels: ["Performance Score"],
        datasets: [
          {
            label: "Score",
            data: [score, 100 - score],
            backgroundColor: [color, "#2c2c3c"],
          },
        ],
      },

      options: {
        cutout: "70%"
      },

      // ✅ MOVE PLUGIN HERE
      plugins: [{
        id: 'textCenter',
        beforeDraw(chart) {
          let width = chart.width;
          let height = chart.height;
          let ctx = chart.ctx;

          ctx.restore();
          let fontSize = (height / 120).toFixed(2);
          ctx.font = fontSize + "em Segoe UI";
          ctx.textBaseline = "middle";

          let text = score + "%";
          let textX = Math.round((width - ctx.measureText(text).width) / 2);
          let textY = height / 2;

          ctx.fillStyle = "#000";
          ctx.fillText(text, textX, textY);
          ctx.save();
        }
      }]
    });

      function goHome() {
        window.location.href = "/";
      }
    </script>
  </body>
</html>
